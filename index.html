<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activity Picker</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat+Brush&family=Outfit:wght@100..900&family=Sixtyfour&display=swap" rel="stylesheet">
</head>
<body>
  <div class="wrapper">
    <div class="background-photo-div">
      <div class="container">
        <h1>Aaron & Lucy's<br><span class="subheading">activity picker</span></h1>

        <form class="form" action="" id="form">
          <fieldset class="fieldset" id="duration">
          <legend class="legend">What time frame would you like an activity for?</legend>
          </fieldset>
          <input class="submit" type="submit" value="Suggest an activity">
          </form>
        <div>
          <p id="msg">Please wait. App is Loading...</p>
        </div>
      </div> 
    </div>
  </div>
  <script src="assets/script/app.js"></script>
</body>
</html>
